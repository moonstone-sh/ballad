name: Ballad CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to validate and publish.
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate Ballad
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
      - uses: actions/checkout@v4
        with:
          repository: moonstone-sh/moonstone
          path: .ci/moonstone
      - uses: actions/checkout@v4
        with:
          repository: moonstone-sh/ballad
          ref: main
          path: .ci/ballad-ci
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install release tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y b3sum
      - name: Build Moonstone CLI
        working-directory: .ci/moonstone
        run: |
          zig build
          echo "$GITHUB_WORKSPACE/.ci/moonstone/zig-out/bin" >> "$GITHUB_PATH"
      - name: Synchronize Ballad
        run: moon sync
      - name: Validate Ballad and export itself
        run: |
          moon exec sh -c '
            set -eu
            ./tests/test_layout_exec.sh
            ./tests/test_native_closure.sh
            if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ]; then
              BALLAD_ROOT="$GITHUB_WORKSPACE" .ci/ballad-ci/tests/test_stage2.sh
            else
              ./tests/test_stage2.sh
            fi
            ./tests/test_watcher.sh
            ./tests/test_publish_verification.sh
          '
          moon run play

  publish:
    name: Publish Ballad registry artifact
    needs: validate
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
      - uses: actions/checkout@v4
        with:
          repository: moonstone-sh/moonstone
          path: .ci/moonstone
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install release tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y b3sum
      - name: Build Moonstone CLI
        working-directory: .ci/moonstone
        run: |
          zig build
          echo "$GITHUB_WORKSPACE/.ci/moonstone/zig-out/bin" >> "$GITHUB_PATH"
      - name: Synchronize and export tagged Ballad
        run: |
          moon sync
          moon run play
      - name: Verify tag version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: test "${RELEASE_TAG#v}" = "$(sed -n 's/^version = "\(.*\)"$/\1/p' moonstone.toml | head -1)"
      - name: Upload immutable GitHub release artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -eu
          asset="$(find dist/ballad/registry-artifact -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          test -n "$asset"
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --title "Ballad $RELEASE_TAG" --generate-notes
          gh release upload "$RELEASE_TAG" "$asset" --clobber
          echo "MOONSTONE_ARTIFACT_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/$(basename "$asset")" >> "$GITHUB_ENV"
      - name: Publish registry artifact
        env:
          MOONSTONE_TOKEN: ${{ secrets.MOONSTONE_TOKEN }}
          MOONSTONE_ARTIFACT_URL: ${{ env.MOONSTONE_ARTIFACT_URL }}
        run: |
          test -n "$MOONSTONE_TOKEN"
          dist/ballad/registry-artifact/publish.sh
      - name: Verify published package is resolvable
        run: scripts/wait-for-publication.sh dist/ballad/registry-artifact/package.toml
