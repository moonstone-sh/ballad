[package]
name = "moonstone/ballad"
version = "0.2.24"
kind = "script"
description = "Deterministic Lua project exporter and bundler for Moonstone"

[runtime]
name = "moonstone/luajit"
version = "2.1.0"
abi = "5.1"

[dependencies.runtime]
"dkjson" = "rocks:dkjson@^2.9-1"

[scripts]
"play" = "lua src/main.lua play partiture.lua \"$@\""
"help" = "lua src/main.lua --help"
